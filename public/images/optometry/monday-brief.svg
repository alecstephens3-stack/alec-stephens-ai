<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" role="img" aria-label="Monday briefing email preview">
  <defs>
    <style>
      .p{font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;letter-spacing:1.2px;text-transform:uppercase;}
      .h{font-family:'Inter Tight','Helvetica Neue',Arial,sans-serif;font-weight:500;letter-spacing:-0.015em;}
      .b{font-family:'Inter Tight','Helvetica Neue',Arial,sans-serif;font-weight:400;}
    </style>
  </defs>
  <rect width="1600" height="600" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1600" height="72" fill="#FAFAFA"/>
  <line x1="0" y1="72" x2="1600" y2="72" stroke="#EDEDED"/>
  <text x="56" y="30" class="p" font-size="11" fill="#6B6B6B">FROM</text>
  <text x="108" y="30" class="h" font-size="13" fill="#1A1A1A">Stephens AI</text>
  <text x="56" y="56" class="p" font-size="11" fill="#6B6B6B">SUBJECT</text>
  <text x="128" y="56" class="h" font-size="13" fill="#1A1A1A">Week in review · Wichita Family Vision</text>
  <text x="1544" y="30" text-anchor="end" class="p" font-size="11" fill="#6B6B6B">MON 20 APR · 07:03</text>

  <text x="56" y="128" class="h" font-size="22" fill="#0A0A0A">Last week: 142 patients, up 6% from the 4-week average.</text>

  <g class="b" font-size="15" fill="#1A1A1A">
    <text x="56" y="176">Optical conversion was 64%, down 4 points. Worth investigating.</text>
    <text x="56" y="204">3 no-shows, in line with trend. Recall compliance at 71%.</text>
  </g>

  <line x1="56" y1="232" x2="1544" y2="232" stroke="#EDEDED"/>

  <text x="56" y="266" class="p" font-size="10" fill="#F47B6B">TOP CONCERN</text>
  <text x="56" y="296" class="h" font-size="18" fill="#0A0A0A">Tuesday no-show rate trending up 3 weeks running. Now 12% vs. 4% clinic average.</text>

  <text x="56" y="346" class="p" font-size="10" fill="#F47B6B">TOP OPPORTUNITY</text>
  <text x="56" y="376" class="h" font-size="18" fill="#0A0A0A">47 patients currently overdue for recall. Roughly $18,800 in potential revenue.</text>

  <text x="56" y="426" class="p" font-size="10" fill="#6B6B6B">RECOMMENDED FOCUS</text>
  <text x="56" y="456" class="b" font-size="15" fill="#1A1A1A">Review Tuesday scheduling. Are confirmations going out on schedule?</text>

  <line x1="0" y1="540" x2="1600" y2="540" stroke="#EDEDED"/>
  <text x="56" y="570" class="p" font-size="10" fill="#6B6B6B">OPEN DASHBOARD  →</text>
  <text x="1544" y="570" text-anchor="end" class="p" font-size="10" fill="#6B6B6B">DELIVERED EVERY MONDAY · 07:00</text>
</svg>
